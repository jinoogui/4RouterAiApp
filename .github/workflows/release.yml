name: Build & Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Gate: read version, skip everything if the tag already exists ──
  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      exists: ${{ steps.check_tag.outputs.exists }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 Version: $VERSION"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "⏭️ Tag ${{ steps.version.outputs.tag }} already exists, skipping build."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "🆕 Tag ${{ steps.version.outputs.tag }} is new, proceeding with build."
          fi

  # ── Build on each platform in parallel ──
  build:
    needs: check
    if: needs.check.outputs.exists == 'false'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows x64
            build_cmd: npx electron-builder --win nsis --x64 --config.win.requestedExecutionLevel=asInvoker
            artifact: win
          - os: macos-latest
            name: macOS Apple Silicon
            build_cmd: npx electron-builder --mac dmg --arm64
            artifact: mac-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fix node-gyp distutils (Python 3.12+)
        if: runner.os == 'Windows'
        run: pip install setuptools

      - name: Install dependencies
        run: npm install

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w node-pty

      - name: Compile TypeScript (main process)
        run: npx tsc -p tsconfig.main.json

      - name: Build Vite (renderer)
        run: npx vite build

      - name: Bundle Node.js runtime and CLI tools
        run: node scripts/bundle-tools.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package application
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 20
          max_attempts: 3
          retry_wait_seconds: 30
          command: ${{ matrix.build_cmd }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.artifact }}
          path: |
            release/*.exe
            release/*.dmg
          if-no-files-found: ignore

  # ── Collect all platform artifacts into one release ──
  release:
    needs: [check, build]
    if: needs.check.outputs.exists == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # git-cliff 需要完整历史 + 所有 tag 才能界定「上个版本到现在」的提交范围
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
          merge-multiple: true

      - name: List collected files
        run: ls -laR dist-artifacts

      - name: Generate changelog (git-cliff)
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          # 新 tag 尚未创建，本次提交属于 unreleased；用 --tag 把它们归到新版本号下
          args: --unreleased --tag ${{ needs.check.outputs.tag }} --strip header
        env:
          OUTPUT: CHANGELOG_RELEASE.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check.outputs.tag }}
          name: ${{ needs.check.outputs.tag }}
          body_path: ${{ steps.changelog.outputs.changelog }}
          files: dist-artifacts/**/*
